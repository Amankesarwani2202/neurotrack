{% extends "base.html" %}
{% block content %}
<section class="card">
  <h2>Letter Search</h2>
  <p class="muted">Play the sound of the target letter and then tap every matching letter in the grid as fast as you can. The grid must stay still while the patient taps.</p>

  <div class="row" style="margin-top:12px; align-items:center; gap:10px; flex-wrap:wrap;">
    <div><strong>Target:</strong> <span id="targetLetter">A</span></div>
    <button class="btn" id="btnStartLetter">Start</button>
    <button class="btn ghost" id="btnFinishLetter">Finish</button>
  </div>
  <div id="letterTimer" class="muted" style="margin-top:8px">Time: 0.00s</div>
  <div id="letterGrid" style="margin-top:16px; display:grid; grid-template-columns: repeat(6, 1fr); gap:6px; touch-action:none; user-select:none;"></div>
  <div id="letterStatus" class="muted" style="margin-top:12px">Not started.</div>
  <div id="nextBtnContainer" class="row" style="margin-top:15px; display:none;"></div>
</section>
{% endblock %}
{% block scripts %}
<script>
const targetLetterEl = document.getElementById('targetLetter');
const gridEl = document.getElementById('letterGrid');
const letterTimer = document.getElementById('letterTimer');
const letterStatus = document.getElementById('letterStatus');
const nextBtnContainer = document.getElementById('nextBtnContainer');
let targetLetter = 'A';
let letters = [];
let totalTargets = 0;
let startTime = 0;
let timerInterval = null;
let foundCount = 0;
let wrongCount = 0;
let finished = false;

function randomLetter() {
  const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  return alphabet[Math.floor(Math.random()*alphabet.length)];
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function buildGrid() {
  const lettersTotal = 36;
  const targetCount = 8;
  targetLetter = ['A','B','C','D','E','F'][Math.floor(Math.random()*6)];
  targetLetterEl.textContent = targetLetter;
  letters = [];
  for (let i = 0; i < targetCount; i++) letters.push({letter: targetLetter, target:true});
  while (letters.length < lettersTotal) {
    const letter = randomLetter();
    if (letter === targetLetter) continue;
    letters.push({letter, target:false});
  }
  letters = shuffle(letters);
  totalTargets = targetCount;
  foundCount = 0;
  wrongCount = 0;
  finished = false;
  gridEl.innerHTML = letters.map((cell, index) => `
    <button class="btn ghost" style="padding:18px 0; font-size:18px; min-height:50px;" data-index="${index}">${cell.letter}</button>
  `).join('');
  Array.from(gridEl.querySelectorAll('button')).forEach(button => {
    button.addEventListener('click', () => handleCellTap(parseInt(button.dataset.index), button));
  });
  letterStatus.textContent = `Grid ready. Press Start and play the letter.`;
}

function handleCellTap(index, button) {
  if (!startTime || finished) return;
  const cell = letters[index];
  if (cell.tapped) return;
  cell.tapped = true;
  if (cell.target) {
    button.style.background = '#d1fae5';
    button.style.borderColor = '#10b981';
    foundCount++;
  } else {
    button.style.background = '#fee2e2';
    button.style.borderColor = '#ef4444';
    wrongCount++;
  }
  letterStatus.textContent = `Found ${foundCount}/${totalTargets} correct, ${wrongCount} wrong.`;
}

function startTimer() {
  startTime = performance.now();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const elapsed = (performance.now() - startTime) / 1000;
    letterTimer.textContent = `Time: ${elapsed.toFixed(2)}s`;
  }, 50);
}

function stopTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
}

function speakLetter() {
  if ('speechSynthesis' in window) {
    const utterance = new SpeechSynthesisUtterance(targetLetter);
    utterance.rate = 0.9;
    window.speechSynthesis.speak(utterance);
  }
}

function calculateLetterScore(timeMs, found, wrong) {
  const correctRatio = totalTargets ? found / totalTargets : 0;
  const accuracy = totalTargets ? Math.max(0, 1 - wrong / (totalTargets + 2)) : 0;
  const timeSeconds = timeMs / 1000;
  const timeScore = Math.max(0, Math.min(100, (40 - timeSeconds) / 30 * 100));
  const score = Math.round(correctRatio * 0.55 * 100 + accuracy * 0.30 * 100 + timeScore * 0.15);
  return Math.max(0, Math.min(100, score));
}

function finishLetterSearch() {
  if (!startTime) { alert('Please start the task first.'); return; }
  finished = true;
  stopTimer();
  const elapsed = performance.now() - startTime;
  const missed = Math.max(0, totalTargets - foundCount);
  const score = calculateLetterScore(elapsed, foundCount, wrongCount);
  const leftTargets = letters.filter((cell, index) => cell.target && index % 2 === 0).length;
  const leftFound = letters.filter((cell, index) => (index % 2 === 0) && cell.target && cell.tapped).length;
  const rightTargets = totalTargets - leftTargets;
  const rightFound = foundCount - leftFound;
  const sideMisses = (leftTargets && leftFound === 0) || (rightTargets && rightFound === 0);
  const payload = {
    target_letter: targetLetter,
    time_ms: Math.round(elapsed),
    correct_found: foundCount,
    wrong_tapped: wrongCount,
    missed: missed,
    total_targets: totalTargets,
    side_misses: sideMisses,
    score: score,
    saved_at: Date.now()
  };
  localStorage.setItem('neuro_letter', JSON.stringify(payload));
  letterStatus.textContent = `Finished. ${foundCount} found, ${missed} missed, ${wrongCount} wrong taps. Score ${score}.`;
  nextBtnContainer.style.display = 'flex';
  addNextButton('nextBtnContainer', 'Results', '/results');
}

document.getElementById('btnStartLetter').addEventListener('click', () => {
  buildGrid();
  speakLetter();
  startTimer();
  letterStatus.textContent = 'Task started. Tap every target letter.';
});

document.getElementById('btnFinishLetter').addEventListener('click', finishLetterSearch);

buildGrid();
</script>
{% endblock %}
