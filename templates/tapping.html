{% extends "base.html" %}
{% block content %}
<div class="container">
    <div class="card center">
        <h2>Tapping Speed Test</h2>
        <p class="lead">Tap the button as fast as you can for 10 seconds.</p>
        
        <div class="timer-pill" id="timer-display">Time Left: 10s</div>
        
        <div id="tap-area" class="tap-circle" style="margin: 40px auto; background: var(--accent2); width: 150px; height: 150px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; cursor: pointer; user-select: none; transition: transform 0.1s, opacity 0.3s;">
            TAP!
        </div>
        
        <h1 id="display-count">0</h1>
        
        <div id="tappingResult" class="muted" style="margin-top:12px; min-height: 24px;"></div>
        
        <div class="row" style="margin-top:12px">
            <button id="start-btn" class="btn">Start Test</button>
        </div>

        <div id="nextBtnContainer" style="margin-top:20px; text-align:center;"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let taps = 0;
let timeLeft = 10;
let active = false;
let timerId = null;

const tapArea = document.getElementById('tap-area');
const startBtn = document.getElementById('start-btn');
const nextBtnContainer = document.getElementById('nextBtnContainer');
const tappingResult = document.getElementById('tappingResult');

function startTest() {
    // Reset Data
    taps = 0;
    timeLeft = 10;
    active = true;
    
    // UI Reset
    document.getElementById('display-count').innerText = "0";
    document.getElementById('timer-display').innerText = "Time Left: 10s";
    tappingResult.textContent = "Keep tapping!";
    tapArea.style.opacity = '1';
    
    startBtn.style.display = 'none';
    nextBtnContainer.innerHTML = ''; // Clear the next button

    timerId = setInterval(() => {
        timeLeft--;
        document.getElementById('timer-display').innerText = `Time Left: ${timeLeft}s`;
        
        if(timeLeft <= 0) {
            clearInterval(timerId);
            finishTest();
        }
    }, 1000);
}

function finishTest() {
    active = false;
    tapArea.style.opacity = '0.4';
    
    // 1. Show Result Summary
    tappingResult.innerHTML = `<strong>Test Complete!</strong> Total Taps: ${taps}`;

    // 2. Save score
    if (typeof NeuroTrack !== 'undefined') {
        NeuroTrack.saveScore('tapping_count', taps);
    }
    localStorage.setItem('neuro_tapping', JSON.stringify({count: taps, date: new Date().toISOString()}));

    // 3. Show Restart Button
    startBtn.innerText = "Try Again";
    startBtn.style.display = 'inline-block';

    // 4. Show the Proceed Button
    nextBtnContainer.innerHTML = `
        <button id="gongo-btn" class="btn" style="
            background: #28a745 !important;
            background-image: none !important;
            margin-top: 20px;
        ">
            Proceed to Go/No-Go Task →
        </button>
    `;
    
    // Add click handler
    document.getElementById('gongo-btn').onclick = function() {
        window.location.href = '/gongo';
    };
}

startBtn.onclick = startTest;

// Use pointerdown for faster response on mobile
tapArea.onpointerdown = (e) => {
    if(!active) return;
    taps++;
    document.getElementById('display-count').innerText = taps;
    
    // Tiny visual feedback on tap
    tapArea.style.transform = 'scale(0.95)';
    setTimeout(() => { tapArea.style.transform = 'scale(1)'; }, 50);
};
</script>
{% endblock %}
