{% extends "base.html" %}
{% block content %}
<div class="container center">
    <div class="card">
        <h2>Digit Span</h2>
        <p id="instruction">Remember the numbers...</p>
        <h1 id="number-display" class="big"></h1>
        <input type="text" id="answer-input" style="display:none; padding:10px; font-size:20px;">
        <button id="submit-btn" class="btn" style="display:none;">Submit</button>
    </div>
</div>

<script>
let sequence = [];
let length = 3;

function startSequence() {
    sequence = Array.from({length}, () => Math.floor(Math.random() * 10));
    document.getElementById('number-display').innerText = sequence.join(' ');
    setTimeout(() => {
        document.getElementById('number-display').innerText = '';
        document.getElementById('answer-input').style.display = 'block';
        document.getElementById('submit-btn').style.display = 'block';
    }, 3000);
}

document.getElementById('submit-btn').onclick = () => {
    const ans = document.getElementById('answer-input').value;
    if(ans === sequence.join('')) {
        length++;
        document.getElementById('answer-input').value = '';
        startSequence();
    } else {
        NeuroTrack.saveScore('digit_span_length', length, '/flanker');
    }
};
startSequence();
</script>
{% endblock %}
