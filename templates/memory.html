{% extends "base.html" %}
{% block content %}
<section class="card">
  <h2>Short-Term Memory</h2>
  <p class="muted">Aim: Briefly view a short digit sequence and type it back from memory. Try to remember a 4-digit sequence.</p>

  <div class="muted" style="margin-top:8px">Round <span id="roundLabel">1</span> of <span id="totalRoundsLabel"></span></div>
  <div id="memoryPrompt" class="big" style="margin-top:8px"></div>
  <div class="row" style="margin-top:12px">
    <button class="btn" id="btnShow">Show Sequence</button>
    <input id="memoryAnswer" placeholder="Type the digits here" />
    <button class="btn ghost" id="btnCheck">Check</button>
  </div>
  <div id="memoryResult" class="muted" style="margin-top:12px">No attempts yet.</div>
  <div id="nextBtnContainer" class="row" style="margin-top:15px; display:none;"></div>
</section>
{% endblock %}
{% block scripts %}
<script>
const totalRounds = 3; // change this to however many rounds you want
let currentRound = 1;
let currentSeq = '';
let results = [];

const nextBtnContainer = document.getElementById('nextBtnContainer');
const roundLabel = document.getElementById('roundLabel');
const totalRoundsLabel = document.getElementById('totalRoundsLabel');
const memoryPrompt = document.getElementById('memoryPrompt');
const memoryAnswer = document.getElementById('memoryAnswer');
const memoryResult = document.getElementById('memoryResult');
const btnShow = document.getElementById('btnShow');
const btnCheck = document.getElementById('btnCheck');

totalRoundsLabel.textContent = totalRounds;

function resetForRound() {
  roundLabel.textContent = currentRound;
  memoryPrompt.textContent = '';
  memoryAnswer.value = '';
  memoryResult.textContent = `Round ${currentRound} of ${totalRounds} — click "Show Sequence" when ready.`;
  currentSeq = '';
}

btnShow.addEventListener('click', () => {
  currentSeq = '' + Math.floor(1000 + Math.random() * 9000);
  memoryPrompt.textContent = currentSeq;
  memoryAnswer.value = '';
  memoryResult.textContent = 'Remembering...';
  nextBtnContainer.style.display = 'none';
  setTimeout(() => { memoryPrompt.textContent = '...'; }, 1200);
});

btnCheck.addEventListener('click', () => {
  const ans = memoryAnswer.value.trim();
  if (!currentSeq || memoryPrompt.textContent !== '...') {
    alert('Show a sequence first, then wait for it to disappear.');
    return;
  }
  const ok = (ans === currentSeq);
  results.push({ round: currentRound, correct: ok ? 1 : 0, sequence: currentSeq, answer: ans });

  if (currentRound >= totalRounds) {
    finishMemoryGame();
  } else {
    memoryResult.textContent = ok ? 'Correct! Moving to next round...' : `Incorrect — was ${currentSeq}. Moving to next round...`;
    currentRound++;
    setTimeout(resetForRound, 1200);
  }
});

function finishMemoryGame() {
  const correctCount = results.reduce((sum, r) => sum + r.correct, 0);
  memoryResult.textContent = `Done! Score: ${correctCount}/${totalRounds} correct.`;
  localStorage.setItem('neuro_memory', JSON.stringify({ correct: correctCount, total: totalRounds, rounds: results }));
  nextBtnContainer.style.display = 'flex';
  addNextButton('nextBtnContainer', 'Famous Faces', '/famous-faces');
}

resetForRound();
</script>
{% endblock %}
